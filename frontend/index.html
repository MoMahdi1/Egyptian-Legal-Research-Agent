<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المستشار القانوني المصري</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:        #c9a84c;
    --gold-light:  #e8c96a;
    --gold-dim:    #8a6f2e;
    --navy:        #0d1b2a;
    --navy-mid:    #112236;
    --navy-card:   #162840;
    --navy-input:  #1a3050;
    --text:        #e8e0d0;
    --text-muted:  #8a8070;
    --text-dim:    #4a4438;
    --border:      rgba(201,168,76,0.18);
    --border-hover:rgba(201,168,76,0.45);
    --radius:      14px;
    --radius-sm:   8px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%;
    background: var(--navy);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    overflow: hidden;
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 28px;
    background: var(--navy-mid);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    background: var(--navy-card);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }

  .avatar svg {
    width: 26px;
    height: 26px;
    fill: var(--gold);
  }

  .online-dot {
    position: absolute;
    bottom: 1px;
    left: 1px;
    width: 10px;
    height: 10px;
    background: #4caf50;
    border-radius: 50%;
    border: 2px solid var(--navy-mid);
  }

  .header-text h1 {
    font-family: 'Amiri', serif;
    font-size: 18px;
    color: var(--gold);
    font-weight: 700;
    line-height: 1.2;
  }

  .header-text p {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .header-badge {
    margin-right: auto;
    background: rgba(201,168,76,0.1);
    border: 1px solid var(--border);
    color: var(--gold-dim);
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    font-family: 'Cairo', sans-serif;
  }

  /* ── Chat ── */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 2px; }

  /* ── Welcome ── */
  .welcome {
    text-align: center;
    padding: 48px 20px 20px;
    animation: fadeUp 0.5s ease both;
  }

  .welcome-seal {
    width: 72px;
    height: 72px;
    border: 1.5px solid var(--gold-dim);
    border-radius: 50%;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--navy-card);
  }

  .welcome-seal svg { width: 36px; height: 36px; fill: var(--gold); }

  .welcome h2 {
    font-family: 'Amiri', serif;
    font-size: 22px;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .welcome p {
    font-size: 13.5px;
    color: var(--text-muted);
    max-width: 440px;
    margin: 0 auto 24px;
    line-height: 1.8;
  }

  /* ── Messages ── */
  .msg-row {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.25s ease both;
  }

  .msg-row.user { flex-direction: row-reverse; }

  .msg-icon {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }

  .msg-icon.bot-icon {
    background: var(--navy-card);
    border: 1px solid var(--border);
  }

  .msg-icon.bot-icon svg { width: 18px; height: 18px; fill: var(--gold); }

  .msg-icon.user-icon {
    background: rgba(201,168,76,0.12);
    border: 1px solid var(--gold-dim);
    font-size: 15px;
    color: var(--gold);
    font-weight: 600;
  }

  .bubble {
    max-width: 75%;
    padding: 13px 17px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.75;
  }

  .bubble.user {
    background: rgba(201,168,76,0.1);
    border: 1px solid var(--gold-dim);
    color: var(--text);
    border-top-left-radius: 4px;
  }

  .bubble.bot {
    background: var(--navy-card);
    border: 1px solid var(--border);
    color: var(--text);
    border-top-right-radius: 4px;
  }

  /* report formatting */
  .bubble.bot h2 {
    font-family: 'Amiri', serif;
    font-size: 15px;
    color: var(--gold);
    margin: 14px 0 6px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
  }

  .bubble.bot h2:first-child { margin-top: 0; }

  .bubble.bot h3 {
    font-family: 'Amiri', serif;
    font-size: 14px;
    color: var(--gold-light);
    margin: 10px 0 4px;
    font-weight: 600;
  }

  .bubble.bot strong { color: var(--gold-light); font-weight: 600; }

  .bubble.bot p { margin-bottom: 8px; }
  .bubble.bot p:last-child { margin-bottom: 0; }

  .bubble.bot ul,
  .bubble.bot ol {
    margin: 6px 0 10px;
    padding-inline-start: 22px;
  }

  .bubble.bot li { margin-bottom: 4px; }

  .meta-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .tag {
    background: rgba(201,168,76,0.08);
    border: 1px solid var(--border);
    color: var(--gold-dim);
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 14px;
  }

  /* ── Typing ── */
  .typing-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: fadeUp 0.25s ease both;
  }

  .typing-bubble {
    background: var(--navy-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-top-right-radius: 4px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dots { display: flex; gap: 5px; }

  .dots span {
    width: 7px;
    height: 7px;
    background: var(--gold-dim);
    border-radius: 50%;
    animation: bounce 1.3s infinite;
  }

  .dots span:nth-child(2) { animation-delay: 0.18s; }
  .dots span:nth-child(3) { animation-delay: 0.36s; }

  .typing-label {
    font-size: 12px;
    color: var(--text-muted);
  }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
    40%            { transform: translateY(-6px); opacity: 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Input ── */
  .input-bar {
    flex-shrink: 0;
    padding: 14px 20px 18px;
    background: var(--navy-mid);
    border-top: 1px solid var(--border);
  }

  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--navy-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px 8px 14px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: var(--gold-dim); }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    resize: none;
    min-height: 36px;
    max-height: 120px;
    padding: 6px 0;
    direction: rtl;
    line-height: 1.6;
  }

  textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 38px;
    height: 38px;
    border-radius: var(--radius-sm);
    background: var(--gold);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s;
  }

  .send-btn:hover { background: var(--gold-light); transform: scale(1.05); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 18px; height: 18px; fill: var(--navy); }

  .input-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
  }
</style>
</head>
<body>
<div class="layout">

  <!-- Header -->
  <header class="header">
    <div class="avatar">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.46-2.35 6.79-5 7.93C9.35 17.79 7 14.46 7 11V7.18L12 5zm-1 3v4h2V8h-2zm0 5v2h2v-2h-2z"/>
      </svg>
      <div class="online-dot"></div>
    </div>
    <div class="header-text">
      <h1>المستشار القانوني المصري</h1>
      <p>متخصص في القانون المدني المصري · مدعوم بالذكاء الاصطناعي</p>
    </div>
    <div class="header-badge">القانون المدني رقم 131 لسنة 1948</div>
  </header>

  <!-- Chat -->
  <main class="chat" id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-seal">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
        </svg>
      </div>
      <h2>أهلاً بك في المستشار القانوني</h2>
      <p>اسألني عن أي موضوع في القانون المدني المصري وسأبحث في النصوص القانونية وأقدم إجابة قانونية مفصلة ودقيقة</p>
    </div>
  </main>

  <!-- Input -->
  <div class="input-bar">
    <div class="input-wrap">
      <textarea
        id="inp"
        placeholder="اكتب سؤالك القانوني هنا..."
        rows="1"
        onkeydown="onKey(event)"
        oninput="resize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" type="button" onclick="send()" title="إرسال">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">اضغط Enter للإرسال · Shift+Enter لسطر جديد</p>
  </div>

</div>

<script>
  const API = 'http://localhost:8000/research';

  // guard بيمنع إرسال أكتر من ريكويست في نفس الوقت
  let isSending = false;
  let currentController = null;

  function resize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function onKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function addMsg(role, html) {
    const chat = document.getElementById('chat');

    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    const iconDiv = document.createElement('div');
    iconDiv.className = 'msg-icon ' + (role === 'user' ? 'user-icon' : 'bot-icon');

    if (role === 'bot') {
      iconDiv.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>`;
    } else {
      iconDiv.textContent = 'أنت';
      iconDiv.style.fontSize = '10px';
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + role;
    bubble.innerHTML = html;

    row.appendChild(iconDiv);
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  function addUserMsg(text) {
    // نص المستخدم بيتعرض كنص عادي escaped، مش HTML
    return addMsg('user', escapeHtml(text));
  }

  function showTyping() {
    const chat = document.getElementById('chat');
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typing';
    row.innerHTML = `
      <div class="msg-icon bot-icon">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
      </div>
      <div class="typing-bubble">
        <div class="dots"><span></span><span></span><span></span></div>
        <span class="typing-label">المستشار يبحث في القانون...</span>
      </div>`;
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  // تحويل نص التقرير (Markdown-ish) لـ HTML بأمان (escape الأول ثم تنسيق)
  function formatReport(raw) {
    let text = escapeHtml(raw);

    // العناوين — ### قبل ## عشان الترتيب يبقى صح
    text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');

    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // قوائم مرقمة
    text = text.replace(/(^\d+\.\s.+(?:\n^\d+\.\s.+)*)/gm, (m) => {
      const items = m.split('\n').map(l => `<li>${l.replace(/^\d+\.\s/, '')}</li>`).join('');
      return `<ol>${items}</ol>`;
    });

    // قوائم نقطية
    text = text.replace(/(^[-•]\s.+(?:\n^[-•]\s.+)*)/gm, (m) => {
      const items = m.split('\n').map(l => `<li>${l.replace(/^[-•]\s/, '')}</li>`).join('');
      return `<ul>${items}</ul>`;
    });

    // فقرات: سطرين فاضيين = فقرة جديدة
    text = text
      .split(/\n{2,}/)
      .map(p => {
        const trimmed = p.trim();
        if (/^<(h2|h3|ol|ul)/.test(trimmed)) return trimmed;
        return `<p>${trimmed.replace(/\n/g, '<br>')}</p>`;
      })
      .join('');

    return text;
  }

  async function send() {
    const inp = document.getElementById('inp');
    const btn = document.getElementById('sendBtn');
    const question = inp.value.trim();

    // guard: منع أي إرسال تاني لحد ما الأول يخلص
    if (!question || isSending) return;
    isSending = true;
    btn.disabled = true;

    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    addUserMsg(question);
    inp.value = '';
    inp.style.height = 'auto';
    showTyping();

    // لو فيه ريكويست قديم لسه ماشي (احتياط إضافي)، نلغيه
    if (currentController) currentController.abort();
    currentController = new AbortController();

    try {
      console.log('[legal-advisor] sending request →', API, { question });

      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
        signal: currentController.signal,
      });

      console.log('[legal-advisor] response status:', res.status);

      if (!res.ok) {
        const bodyText = await res.text().catch(() => '');
        throw new Error(`خطأ من الخادم (${res.status})${bodyText ? ': ' + bodyText.slice(0, 200) : ''}`);
      }

      const data = await res.json();
      console.log('[legal-advisor] response data:', data);

      removeTyping();

      const srcLabel = (data.sources || []).includes('web') ? '🌐 ويب' : '📄 وثائق قانونية';
      const qCount   = (data.queries_used || []).length;

      const html = `
        <div class="meta-row">
          <span class="tag">${srcLabel}</span>
          <span class="tag">🔍 ${qCount} استعلامات</span>
          ${data.rewritten_query ? `<span class="tag" title="${escapeHtml(data.rewritten_query)}">✏️ صياغة محسّنة</span>` : ''}
        </div>
        ${formatReport(data.report || '')}
      `;

      addMsg('bot', html);

    } catch (err) {
      console.error('[legal-advisor] request failed:', err);
      removeTyping();

      let msg = err.message;
      if (err.name === 'AbortError') {
        msg = null; // اتلغى لصالح ريكويست أحدث، ملحقش نعرض خطأ
      } else if (msg === 'Failed to fetch') {
        msg = 'تعذر الاتصال بالخادم — تأكد إن الـ API شغال على localhost:8000 وإن الـ CORS مظبوط';
      }

      if (msg) {
        addMsg('bot', `<span style="color:#e57373">❌ ${escapeHtml(msg)}</span>`);
      }
    } finally {
      isSending = false;
      btn.disabled = false;
      inp.focus();
    }
  }
</script>
</body>
</html>
